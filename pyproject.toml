[tool.black]
line-length = 79
target-version = ['py38', 'py39', 'py310', 'py311']
skip-string-normalization = true

#[tool.flake8]
#max-line-length = 79
#exclude = ".git,.venv,.tox,build,dist,*migrations*"
#ignore = "E203,W503"

#[tool.mypy]
#python_version = "3.11"
#warn_return_any = true
#ignore_missing_imports = true
#disallow_untyped_defs = true
#follow_imports = "skip"

[tool.ruff]
select = ["E", "F", "I", "UP"]
ignore = []
line-length = 79
target-version = "py38"

[tool.ruff.per-file-ignores]
"tests/*" = ["TCH"]

[tool.ruff.pydocstyle]
convention = "google"
